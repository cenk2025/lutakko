<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#05070d"/>
      <stop offset="100%" stop-color="#0a1726"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="15%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#a3e635" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#a3e635" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a3e635"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a3e635" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fb7185" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Wave + anchor brandmark -->
  <g stroke="#a3e635" stroke-width="3" fill="none" stroke-linecap="round" transform="translate(82, 90)">
    <rect x="-2" y="-2" width="80" height="80" rx="18" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <path d="M14 56 c10 -8 18 -8 28 0 s18 8 28 0"/>
    <path d="M38 18 v40"/>
    <circle cx="38" cy="18" r="4" fill="#a3e635"/>
    <path d="M22 40 h32"/>
  </g>

  <!-- Eyebrow -->
  <text x="180" y="135" font-family="Helvetica, Arial, sans-serif" font-size="22" letter-spacing="6" fill="rgba(255,255,255,0.75)">
    JYVÄSKYLÄ · LUTAKKO
  </text>

  <!-- Title -->
  <text x="80" y="320" font-family="Helvetica, Arial, sans-serif" font-weight="800" font-size="148" fill="url(#title)" letter-spacing="-4">
    Lutakko.info
  </text>

  <!-- Subtitle -->
  <text x="84" y="395" font-family="Helvetica, Arial, sans-serif" font-weight="300" font-size="52" fill="#ffffff" letter-spacing="-1">
    Lutakon Satama
  </text>

  <!-- Bottom rule -->
  <rect x="80" y="468" width="1040" height="1" fill="url(#line)"/>

  <!-- Bottom row -->
  <text x="80" y="525" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.75)">
    Suomen elämyksellisin satama — Finland's most experiential harbour
  </text>
  <text x="80" y="568" font-family="Helvetica, Arial, sans-serif" font-size="22" letter-spacing="3" fill="rgba(255,255,255,0.55)">
    SuomiPop · Secto Rally Finland · OlutSatama · Sataman Viilu · Tanssisali Lutakko
  </text>
  <text x="1120" y="568" font-family="Helvetica, Arial, sans-serif" font-size="20" text-anchor="end" fill="rgba(255,255,255,0.55)" letter-spacing="3">
    by Voon IQ
  </text>
</svg>
